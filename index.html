<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>AI Project Context Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ── Design tokens ── */
    :root {
      --theme-color: #2563eb;
      --sidebar-width: 272px;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-primary-bg: #eff6ff;
      --color-code-bg: #0f172a;
    }

    /* ── Base ── */
    body {
      font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
    }

    .sidebar-nav {
      padding: 8px 12px 48px;
    }

    .app-name-link {
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--color-text) !important;
      letter-spacing: -0.01em;
    }

    .app-name-link:hover {
      color: var(--color-primary) !important;
    }

    /* Section headers (bold text in sidebar) */
    .sidebar-nav p {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin: 20px 0 4px 4px;
      padding: 0;
    }

    .sidebar-nav ul {
      margin: 0;
      padding: 0;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav li a {
      display: block;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #334155;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-nav li a:hover {
      background: var(--color-bg);
      color: var(--color-primary);
    }

    .sidebar-nav li.active > a {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      font-weight: 600;
    }

    /* Search */
    .search {
      padding: 12px 12px 4px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 4px;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.8125rem;
      background: var(--color-bg);
      color: var(--color-text);
      box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .search .results-panel {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      font-size: 0.875rem;
    }

    .search .matching-post {
      border-bottom: 1px solid var(--color-border);
    }

    .search .matching-post:last-child {
      border-bottom: none;
    }

    /* ── Content area ── */
    .content {
      background: var(--color-bg);
    }

    .markdown-section {
      max-width: 820px;
      padding: 48px 56px 80px;
    }

    /* ── Typography ── */
    .markdown-section h1 {
      font-size: 1.875rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--color-text);
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 16px;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }

    .markdown-section h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--color-border);
      letter-spacing: -0.01em;
    }

    .markdown-section h3 {
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--color-text);
      margin-top: 32px;
      margin-bottom: 12px;
    }

    .markdown-section p {
      color: #1e293b;
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px;
      color: #1e293b;
    }

    .markdown-section li {
      margin-bottom: 6px;
      line-height: 1.7;
    }

    /* ── Links ── */
    .markdown-section a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* ── Code ── */
    .markdown-section pre {
      background: var(--color-code-bg) !important;
      border-radius: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 20px 0;
      position: relative;
    }

    .markdown-section pre code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .markdown-section p > code,
    .markdown-section li > code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8125em;
      background: #f1f5f9;
      color: #be185d;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
    }

    /* Copy-code button */
    .docsify-copy-code-button {
      font-family: 'Sarabun', sans-serif !important;
      font-size: 0.6875rem !important;
      background: rgba(255,255,255,0.08) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 5px !important;
      color: #94a3b8 !important;
      padding: 4px 10px !important;
      top: 10px !important;
      right: 10px !important;
    }

    .docsify-copy-code-button:hover {
      background: rgba(255,255,255,0.15) !important;
      color: #e2e8f0 !important;
    }

    /* ── Blockquotes → info boxes ── */
    .markdown-section blockquote {
      background: var(--color-primary-bg);
      border-left: 4px solid var(--color-primary);
      border-radius: 0 8px 8px 0;
      padding: 14px 20px;
      margin: 24px 0;
    }

    .markdown-section blockquote p {
      color: #1e40af;
      margin: 0;
      font-size: 0.9375rem;
    }

    /* ── Tables ── */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9375rem;
      margin: 24px 0;
    }

    .markdown-section th {
      background: #f1f5f9;
      font-weight: 600;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 2px solid var(--color-border);
      font-size: 0.875rem;
    }

    .markdown-section td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
    }

    .markdown-section tr:last-child td {
      border-bottom: none;
    }

    .markdown-section tr:hover td {
      background: #f8fafc;
    }

    /* ── Horizontal rule ── */
    .markdown-section hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 32px 0;
    }

    /* ── Pagination ── */
    .pagination-item {
      padding: 0;
    }

    .pagination-item a {
      display: flex;
      flex-direction: column;
      padding: 14px 20px;
      border: 1px solid var(--color-border) !important;
      border-radius: 10px;
      text-decoration: none !important;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      background: var(--color-surface);
    }

    .pagination-item a:hover {
      background: var(--color-primary-bg);
      border-color: var(--color-primary) !important;
      box-shadow: 0 2px 8px rgba(37,99,235,0.1);
    }

    .pagination-item-label {
      font-size: 0.75rem;
      color: var(--color-text-muted) !important;
      font-weight: 500;
      margin-bottom: 4px;
      display: block;
    }

    .pagination-item-title {
      font-size: 0.9375rem;
      color: var(--color-primary) !important;
      font-weight: 600;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 28px 20px 64px;
      }

      .markdown-section h1 {
        font-size: 1.5rem;
      }

      .markdown-section pre {
        border-radius: 8px;
        padding: 16px;
      }
    }

    /* ── Navbar ── */
    .app-nav {
      border-bottom: 1px solid var(--color-border);
    }

    /* ── Sidebar toggle (mobile) ── */
    .sidebar-toggle {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🤖 AI Context Kit',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'ค้นหา...',
        noData: 'ไม่พบผลลัพธ์',
        depth: 3,
      },
      coverpage: false,
      homepage: '00-overview.md',
      themeColor: '#2563eb',
      pagination: {
        previousText: '← ก่อนหน้า',
        nextText: 'ถัดไป →',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
